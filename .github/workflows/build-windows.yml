name: Build Windows

# Triggers:
#   - push a version tag from Mac:  git tag v1.0.0 && git push origin v1.0.0
#   - manual run from GitHub UI (Actions tab → Run workflow) for testing

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label (e.g. v1.0.0). Defaults to "dev".'
        required: false
        default: 'dev'

permissions:
  contents: write   # needed to upload to GitHub Releases

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python ───────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Determine version label ───────────────────────────────
      # On tag push  → use the tag (e.g. v1.0.0)
      # On manual run → use the workflow_dispatch input
      - name: Set version
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      # ── 4. Install dependencies ──────────────────────────────────
      # pip on a fresh GitHub Actions Windows runner:
      # - Python DLLs are in the standard PATH, so PyInstaller finds
      #   sqlite3/ssl/lzma automatically (no conda Library/bin needed)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install snappy numpy scipy "PySide6>=6.6" pyinstaller Pillow

      # ── 5. Generate .ico ─────────────────────────────────────────
      # macOS uses .icns — Windows needs .ico. Generate from the PNG.
      - name: Generate icon
        run: |
          python -c "
          from PIL import Image
          img = Image.open('assets/ManifoldIndex_1024.png')
          img.save('assets/ManifoldIndex.ico', format='ICO',
                   sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])
          print('ManifoldIndex.ico generated')
          "

      # ── 6. Preflight check ───────────────────────────────────────
      - name: Verify entry point importable
        run: |
          python -c "
          import sys; sys.path.insert(0, 'src')
          from manifold_index.app import launch_gui
          print('launch_gui importable — OK')
          "

      # ── 7. PyInstaller build ─────────────────────────────────────
      - name: Build with PyInstaller
        run: |
          pyinstaller ManifoldIndex_win.spec --noconfirm --clean

      # ── 8. Verify output ─────────────────────────────────────────
      - name: Verify build output
        shell: bash
        run: |
          if [ ! -f "dist/ManifoldIndex.exe" ]; then
            echo "ERROR: dist/ManifoldIndex.exe not found"
            exit 1
          fi
          echo "ManifoldIndex.exe found — OK"

      # ── 9. Upload artifact (always) ─────────────────────────────
      # Available in Actions tab even on manual/non-tag runs.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ManifoldIndex-${{ steps.ver.outputs.version }}-windows
          path: dist/ManifoldIndex.exe
          retention-days: 7

      # ── 10. Upload to GitHub Release (tag pushes only) ──────────
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          files: dist/ManifoldIndex.exe
          body: |
            **Windows build — ${{ steps.ver.outputs.version }}**

            1. Download `ManifoldIndex.exe`
            2. Run it — no installation needed

            > Windows Defender may show an unknown publisher warning.
            > Click **More info → Run anyway**.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
