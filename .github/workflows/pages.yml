name: Deploy GitHub Pages (v0.3/docs)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # If v0.3/docs is already a built static site (index.html inside),
      # just upload it as the Pages artifact:
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: v0.3/docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4