<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
<defs>

      <radialGradient id="bg" cx="50%" cy="50%" r="70%">
        <stop offset="0%"   stop-color="#161d45"/>
        <stop offset="100%" stop-color="#0a0e28"/>
      </radialGradient>
    

      <radialGradient id="diskGrad" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="#1a2255"/>
        <stop offset="85%"  stop-color="#0e1338"/>
        <stop offset="100%" stop-color="#0b0f30"/>
      </radialGradient>
    

      <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="6" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>
    

      <filter id="ringGlow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="8" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    

      <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    
  <clipPath id="diskClip"><circle cx="256.0" cy="256.0" r="210"/></clipPath>
</defs>
<rect width="512" height="512" fill="url(#bg)"/>
<circle cx="256.0" cy="256.0" r="210" fill="url(#diskGrad)"/>
<g clip-path="url(#diskClip)" filter="url(#glow)">
  <path d="M 256.00 47.05 A 363.74 363.74 0 0 1 75.04 360.47" fill="none" stroke="rgb(120,180,255)" stroke-width="1.43" stroke-opacity="0.564" stroke-linecap="round"/>
  <path d="M 75.04 360.47 A 363.74 363.74 0 0 1 436.96 360.48" fill="none" stroke="rgb(120,180,255)" stroke-width="1.43" stroke-opacity="0.564" stroke-linecap="round"/>
  <path d="M 436.96 360.48 A 363.74 363.74 0 0 1 256.00 47.05" fill="none" stroke="rgb(120,180,255)" stroke-width="1.43" stroke-opacity="0.564" stroke-linecap="round"/>
</g>
<circle cx="256.0" cy="256.0" r="210" fill="none" stroke="#5080e0" stroke-width="2.5" stroke-opacity="0.85" filter="url(#ringGlow)"/>

      <text x="256.0" y="264.0" text-anchor="middle"
            dominant-baseline="central"
            font-family="-apple-system, Helvetica Neue, Arial, sans-serif"
            font-weight="700" font-size="128"
            fill="#dce2ff" fill-opacity="0.90"
            filter="url(#textShadow)">M</text>
    

      <text x="328.0" y="301.0" text-anchor="middle"
            dominant-baseline="central"
            font-family="-apple-system, Helvetica Neue, Arial, sans-serif"
            font-weight="700" font-size="62"
            fill="#70a8ff" fill-opacity="0.75"
            filter="url(#textShadow)">I</text>
    
</svg>